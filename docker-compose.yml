services:
  postgres:
    image: postgres:16
    container_name: fintech-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fintech}
      POSTGRES_USER: ${POSTGRES_USER:-fintech}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fintech}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fintech} -d ${POSTGRES_DB:-fintech}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fintech-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-fintech}
      DB_USERNAME: ${POSTGRES_USER:-fintech}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-fintech}
      DB_SSL_MODE: disable
      APP_JWT_SECRET: ${APP_JWT_SECRET:-fintech-secret-key-please-change-this-value-123456}
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  postgres_data:
