# Production database config. You can either provide the Spring datasource vars directly,
# or split a postgres:// URI into DB_HOST, DB_PORT, DB_NAME, DB_USERNAME, DB_PASSWORD, DB_SSL_MODE.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:fintech}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DB_USERNAME:fintech}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:fintech}}
spring.datasource.hikari.data-source-properties.sslmode=${DB_SSL_MODE:disable}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

server.port=${SERVER_PORT:8080}
app.jwt.secret=${APP_JWT_SECRET:fintech-secret-key-please-change-this-value-123456}
